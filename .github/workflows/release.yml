name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release-artifacts:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_name: linux-x86_64
            package_ext: tar.gz
          - os: macos-latest
            target_name: macos
            package_ext: tar.gz
          - os: windows-latest
            target_name: windows-x86_64
            package_ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p fastchat-desktop

      - name: Package artifact (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/fastchat-desktop dist/
          tar -czf "fastchat-${{ github.ref_name }}-${{ matrix.target_name }}.tar.gz" -C dist fastchat-desktop

      - name: Package artifact (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/release/fastchat-desktop.exe" "dist/fastchat-desktop.exe"
          Compress-Archive -Path "dist/fastchat-desktop.exe" -DestinationPath "fastchat-${{ github.ref_name }}-${{ matrix.target_name }}.zip" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: fastchat-${{ matrix.target_name }}
          path: fastchat-${{ github.ref_name }}-${{ matrix.target_name }}.${{ matrix.package_ext }}
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-release-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: fastchat-*
          path: release-artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd release-artifacts
          shasum -a 256 * > SHA256SUMS.txt

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
